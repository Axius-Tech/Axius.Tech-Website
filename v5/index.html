<script type="text/babel">
  // Inject JSON-LD structured data once globals are loaded.
  // Swap /v4/ URL with /v5/ so canonical/url fields match this page.
  function injectJsonLd() {
    if (!window.AxiusJsonLdV4) return setTimeout(injectJsonLd, 50);
    var v5 = JSON.parse(JSON.stringify(window.AxiusJsonLdV4));
    if (v5.url)  v5.url  = v5.url.replace('/v4/', '/v5/');
    var el = document.getElementById('axius-jsonld');
    if (el) el.textContent = JSON.stringify(v5);
  }
  injectJsonLd();

  function waitForGlobals(cb) {
    if (window.AxiusTokens && window.AxiusDirectionJ && window.AxiusPersonalization)
      cb();
    else
      setTimeout(function () { waitForGlobals(cb); }, 40);
  }
  waitForGlobals(function () {
    ReactDOM.createRoot(document.getElementById('stage-quiet09'))
      .render(React.createElement(window.AxiusDirectionJ));
  });
</script>
