<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Axius — Compare</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,500;1,8..60,600&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #0F0E0C; }
  body { font-family: 'Inter', system-ui, sans-serif; color: #F5F1EA; }

  .stage-original { width: 1440px; margin: 0 auto; background: #0F0E0C; }
  .stage-final { width: 1440px; margin: 0 auto; background: #0F0E0C; }
  .stage-studio { width: 1440px; margin: 0 auto; background: #0F0E0C; }
  .stage-vivid { width: 1440px; margin: 0 auto; background: #F4EFE6; }
  .stage-quiet { width: 1440px; margin: 0 auto; background: #F7F6F2; }
  /* Quiet stages now max-out at their design width but shrink with
     the viewport so the page never overflows horizontally below it. */
  .stage-quiet05 { width: 100%; max-width: 1800px; margin: 0 auto; background: #F7F6F2; }
  .stage-quiet06 { width: 100%; max-width: 1800px; margin: 0 auto; background: #F7F6F2; }
  .stage-quiet075 { width: 100%; max-width: 1600px; margin: 0 auto; background: #F5F1EA; }
  .stage-quiet090 { width: 100%; max-width: 1600px; margin: 0 auto; background: #EFEAE0; }
  .stage-quiet2 { width: 1440px; margin: 0 auto; background: #0E0C0A; }
  .stage-quiet3 { width: 1440px; margin: 0 auto; background: #050805; }
  .stage-matrix { width: 1440px; margin: 0 auto; background: #020503; }
  .hidden { display: none !important; }

  /* version-switcher chip — fixed top-right */
  .axius-switcher {
    position: fixed; top: 16px; right: 16px; z-index: 9999;
    display: inline-flex; align-items: stretch;
    border: 1px solid rgba(245,241,234,0.16);
    background: rgba(15,14,12,0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    user-select: none;
  }
  .axius-switcher .label {
    padding: 10px 14px;
    color: rgba(245,241,234,0.48);
    border-right: 1px solid rgba(245,241,234,0.08);
    display: inline-flex; align-items: center; gap: 8px;
  }
  .axius-switcher .label::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: #B8743C;
  }
  .axius-switcher button {
    all: unset; cursor: pointer;
    padding: 10px 14px;
    color: rgba(245,241,234,0.72);
    transition: background .12s ease, color .12s ease;
    display: inline-flex; align-items: center; gap: 8px;
    white-space: nowrap;
  }
  .axius-switcher button + button { border-left: 1px solid rgba(245,241,234,0.08); }
  .axius-switcher button:hover { color: #F5F1EA; }
  .axius-switcher button.active {
    background: #B8743C; color: #0F0E0C;
  }
  .axius-switcher .hint {
    padding: 10px 14px;
    color: rgba(245,241,234,0.32);
    border-left: 1px solid rgba(245,241,234,0.08);
    font-size: 9px;
  }
  /* collapse / expand toggle — sits at the right edge of the switcher */
  .axius-switcher .collapse {
    all: unset; cursor: pointer;
    padding: 10px 12px;
    color: rgba(245,241,234,0.55);
    border-left: 1px solid rgba(245,241,234,0.08);
    transition: color .15s ease, background .15s ease;
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; line-height: 1;
  }
  .axius-switcher .collapse:hover {
    color: #F5F1EA;
    background: rgba(245,241,234,0.04);
  }
  /* Collapsed pill — minimal footprint, single chip */
  .axius-switcher.collapsed {
    cursor: pointer;
    transition: background .15s ease;
  }
  .axius-switcher.collapsed:hover { background: rgba(15,14,12,0.95); }
  .axius-switcher.collapsed .current {
    padding: 10px 14px;
    color: rgba(245,241,234,0.85);
    display: inline-flex; align-items: center; gap: 10px;
  }
  .axius-switcher.collapsed .current .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #B8743C;
  }
  .axius-switcher.collapsed .current .expand {
    padding-left: 10px; margin-left: 4px;
    border-left: 1px solid rgba(245,241,234,0.08);
    color: rgba(245,241,234,0.55);
    font-size: 12px;
  }
</style>
<script>
  window.addEventListener('error', function(e){
    if (e && e.message && e.message.indexOf('ResizeObserver') !== -1) {
      e.stopImmediatePropagation && e.stopImmediatePropagation();
      e.preventDefault && e.preventDefault();
    }
  }, true);
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div id="switcher-root"></div>

<!-- Editorial · Original — the prototype as first shared -->
<div id="stage-original" class="stage-original hidden"></div>

<!-- Editorial · Final — publication-grade refinement of B -->
<div id="stage-final" class="stage-final hidden"></div>

<!-- Studio — modern modular direction -->
<div id="stage-studio" class="stage-studio hidden"></div>

<!-- Vivid — bright magazine/poster direction -->
<div id="stage-vivid" class="stage-vivid hidden"></div>

<!-- Quiet — minimalist futuristic with latent color -->
<div id="stage-quiet" class="stage-quiet hidden"></div>

<!-- Quiet 0.5 — refined edition with EN/ES, locked highlights, glowing italics -->
<div id="stage-quiet05" class="stage-quiet05 hidden"></div>

<!-- Quiet 0.6 — operator-card hero variant (B) by default, same DNA as 0.5 -->
<div id="stage-quiet06" class="stage-quiet06 hidden"></div>

<!-- Quiet 0.75 — editorial collage direction, bone + copper palette -->
<div id="stage-quiet075" class="stage-quiet075 hidden"></div>

<!-- Quiet 0.90 — framed gallery layout, Quiet 0.5 palette + collage -->
<div id="stage-quiet090" class="stage-quiet090 hidden"></div>

<!-- Quiet Two — dark mode + subtle Matrix touches -->
<div id="stage-quiet2" class="stage-quiet2 hidden"></div>

<!-- Quiet Three — phosphor-leaning dark + sparklines + dispatch -->
<div id="stage-quiet3" class="stage-quiet3 hidden"></div>

<!-- Matrix — terminal/AI/inside the simulation -->
<div id="stage-matrix" class="stage-matrix hidden"></div>

<script>
  window.__AXIUS_FOUNDER_PHOTO = '../assets/andres-toro.jpg';
</script>

<!-- Local-only secrets (gitignored).  Loads BEFORE shared so the
     override block at the bottom of shared.jsx merges real values in.
     If this file is missing, the prototype still loads — Telegram
     integration will just stay inert with placeholder credentials. -->
<script type="text/babel" src="axius-secrets.local.jsx"></script>

<!-- design system + data + shared atoms -->
<script type="text/babel" src="axius-shared.jsx"></script>

<!-- Direction B Prototype — original editorial as first shared -->
<script type="text/babel" src="axius-direction-B-prototype.jsx"></script>

<!-- Direction B · Final — Editorial (publication-grade) -->
<script type="text/babel" src="axius-direction-B-final.jsx"></script>

<!-- Direction C — Studio (modern modular) -->
<script type="text/babel" src="axius-direction-C.jsx"></script>

<!-- Direction D — Vivid (magazine/poster) -->
<script type="text/babel" src="axius-direction-D.jsx"></script>

<!-- Direction E — Quiet (minimalist futuristic) -->
<script type="text/babel" src="axius-direction-E.jsx"></script>

<!-- Direction E05 — Quiet 0.5 (refined edition) -->
<script type="text/babel" src="axius-direction-E05.jsx"></script>

<!-- Direction E06 — Quiet 0.6 (operator-card hero variant) -->
<script type="text/babel" src="axius-direction-E06.jsx"></script>

<!-- Direction E075 — Quiet 0.75 (editorial collage) -->
<script type="text/babel" src="axius-direction-E075.jsx"></script>

<!-- Direction E090 — Quiet 0.90 (framed gallery layout) -->
<script type="text/babel" src="axius-direction-E090.jsx"></script>

<!-- Direction E2 — Quiet Two (dark + subtle matrix) -->
<script type="text/babel" src="axius-direction-E2.jsx"></script>

<!-- Direction E3 — Quiet Three (phosphor-leaning + sparklines + dispatch) -->
<script type="text/babel" src="axius-direction-E3.jsx"></script>

<!-- Direction G — Matrix (terminal, AI, dense ops console) -->
<script type="text/babel" src="axius-direction-G.jsx"></script>

<script type="text/babel">
const VIEWS = ['original', 'final', 'studio', 'vivid', 'quiet', 'quiet05', 'quiet06', 'quiet075', 'quiet090', 'quiet2', 'quiet3', 'matrix'];

function waitForGlobals(cb) {
  const ready =
    window.AxiusTokens &&
    window.AxiusDirectionBPrototype &&
    window.AxiusDirectionBFinal &&
    window.AxiusDirectionC &&
    window.AxiusDirectionD &&
    window.AxiusDirectionE &&
    window.AxiusDirectionE05 &&
    window.AxiusDirectionE06 &&
    window.AxiusDirectionE075 &&
    window.AxiusDirectionE090 &&
    window.AxiusDirectionE2 &&
    window.AxiusDirectionE3 &&
    window.AxiusDirectionG;
  if (ready) cb();
  else setTimeout(() => waitForGlobals(cb), 40);
}

function resolveInitial() {
  const fromHash = (location.hash || '').match(/v=(original|final|studio|vivid|quiet090|quiet075|quiet06|quiet05|quiet3|quiet2|quiet|matrix)/i);
  if (fromHash) return fromHash[1].toLowerCase();
  const fromStore = localStorage.getItem('axius:compare');
  if (VIEWS.includes(fromStore)) return fromStore;
  return 'quiet05';
}

function Switcher({ value, onChange }) {
  const options = [
    ['original',  'Editorial · Original'],
    ['final',     'Editorial · Final'],
    ['studio',    'Studio'],
    ['vivid',     'Vivid'],
    ['quiet',     'Quiet'],
    ['quiet05',   'Quiet 0.5'],
    ['quiet06',   'Quiet 0.6'],
    ['quiet075',  'Quiet 0.75'],
    ['quiet090',  'Quiet 0.90'],
    ['quiet2',    'Quiet Two'],
    ['quiet3',    'Quiet Three'],
    ['matrix',    'Matrix'],
  ];
  const [collapsed, setCollapsed] = React.useState(() => {
    return localStorage.getItem('axius:switcher-collapsed') === '1';
  });
  React.useEffect(() => {
    localStorage.setItem('axius:switcher-collapsed', collapsed ? '1' : '0');
  }, [collapsed]);

  const current = options.find(([k]) => k === value);
  const currentLabel = current ? current[1] : value;

  if (collapsed) {
    return (
      <div
        className="axius-switcher collapsed"
        role="button"
        tabIndex={0}
        aria-label="Expand view switcher"
        onClick={() => setCollapsed(false)}
        onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setCollapsed(false); } }}>
        <span className="current">
          <span className="dot"/>
          {currentLabel}
          <span className="expand">▾</span>
        </span>
      </div>
    );
  }

  return (
    <div className="axius-switcher" role="tablist" aria-label="View">
      <span className="label">View</span>
      {options.map(([key, label]) => (
        <button
          key={key}
          className={value === key ? 'active' : ''}
          onClick={() => onChange(key)}
          role="tab"
          aria-selected={value === key}>
          {label}
        </button>
      ))}
      <span className="hint">press 1–9</span>
      <button
        className="collapse"
        type="button"
        onClick={() => setCollapsed(true)}
        aria-label="Collapse view switcher"
        title="Collapse">
        ✕
      </button>
    </div>
  );
}

function App() {
  const [v, setV] = React.useState(resolveInitial);

  React.useEffect(() => {
    localStorage.setItem('axius:compare', v);
    history.replaceState(null, '', '#v=' + v);
    document.title =
      v === 'original'  ? 'Axius — Editorial · Original' :
      v === 'final'     ? 'Axius — Editorial · Final' :
      v === 'studio'    ? 'Axius — Studio' :
      v === 'vivid'     ? 'Axius — Vivid' :
      v === 'quiet'     ? 'Axius — Quiet' :
      v === 'quiet05'   ? 'Axius — Quiet 0.5' :
      v === 'quiet06'   ? 'Axius — Quiet 0.6' :
      v === 'quiet075'  ? 'Axius — Quiet 0.75' :
      v === 'quiet090'  ? 'Axius — Quiet 0.90' :
      v === 'quiet2'    ? 'Axius — Quiet Two' :
      v === 'quiet3'    ? 'Axius — Quiet Three' :
                          'AXIUS.OS — TERMINAL';

    const ids = {
      original: 'stage-original',
      final: 'stage-final',
      studio: 'stage-studio',
      vivid: 'stage-vivid',
      quiet: 'stage-quiet',
      quiet05: 'stage-quiet05',
      quiet06: 'stage-quiet06',
      quiet075: 'stage-quiet075',
      quiet090: 'stage-quiet090',
      quiet2: 'stage-quiet2',
      quiet3: 'stage-quiet3',
      matrix: 'stage-matrix',
    };
    Object.entries(ids).forEach(([key, id]) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.classList.toggle('hidden', key !== v);
    });

    // Match <html> + <body> background to the active stage so the
    // page never reveals the default dark fill at the edges — happens
    // when the viewport is wider than the stage's max-width, when the
    // user zooms out, or on ultra-wide monitors.  Keeping these in sync
    // means the page reads as one continuous canvas at any zoom level.
    const STAGE_BG = {
      original: '#0F0E0C',
      final:    '#0F0E0C',
      studio:   '#0F0E0C',
      vivid:    '#F4EFE6',
      quiet:    '#F7F6F2',
      quiet05:  '#F7F6F2',
      quiet06:  '#F7F6F2',
      quiet075: '#F5F1EA',
      quiet090: '#EFEAE0',
      quiet2:   '#0E0C0A',
      quiet3:   '#050805',
      matrix:   '#020503',
    };
    const bg = STAGE_BG[v] || '#0F0E0C';
    document.documentElement.style.background = bg;
    document.body.style.background = bg;
  }, [v]);

  // Keyboard: 1–9 → the nine views in order
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target && /input|textarea|button/i.test(e.target.tagName)) return;
      const map = ['original','final','studio','vivid','quiet','quiet05','quiet06','quiet075','quiet090','quiet2','quiet3','matrix'];
      const idx = parseInt(e.key, 10);
      if (!isNaN(idx) && idx >= 1 && idx <= map.length) setV(map[idx - 1]);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  return <Switcher value={v} onChange={setV}/>;
}

waitForGlobals(() => {
  ReactDOM.createRoot(document.getElementById('stage-original'))
    .render(<window.AxiusDirectionBPrototype wordmark="B"/>);

  ReactDOM.createRoot(document.getElementById('stage-final'))
    .render(<window.AxiusDirectionBFinal wordmark="B"/>);

  ReactDOM.createRoot(document.getElementById('stage-studio'))
    .render(<window.AxiusDirectionC wordmark="C"/>);

  ReactDOM.createRoot(document.getElementById('stage-vivid'))
    .render(<window.AxiusDirectionD/>);

  ReactDOM.createRoot(document.getElementById('stage-quiet'))
    .render(<window.AxiusDirectionE/>);

  ReactDOM.createRoot(document.getElementById('stage-quiet05'))
    .render(<window.AxiusDirectionE05/>);

  ReactDOM.createRoot(document.getElementById('stage-quiet06'))
    .render(<window.AxiusDirectionE06/>);

  ReactDOM.createRoot(document.getElementById('stage-quiet075'))
    .render(<window.AxiusDirectionE075/>);

  ReactDOM.createRoot(document.getElementById('stage-quiet090'))
    .render(<window.AxiusDirectionE090/>);

  ReactDOM.createRoot(document.getElementById('stage-quiet2'))
    .render(<window.AxiusDirectionE2/>);

  ReactDOM.createRoot(document.getElementById('stage-quiet3'))
    .render(<window.AxiusDirectionE3/>);

  ReactDOM.createRoot(document.getElementById('stage-matrix'))
    .render(<window.AxiusDirectionG/>);

  ReactDOM.createRoot(document.getElementById('switcher-root'))
    .render(<App/>);
});
</script>

</body>
</html>
